networks:
  mapmytrain-mesh:
    driver: bridge

volumes:
  postgis_data:
  redis_data:
  tile_cache:

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: mmt-postgis-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mmt_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_spatial_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-mapmytrain}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    networks:
      - mapmytrain-mesh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mmt_admin} -d ${POSTGRES_DB:-mapmytrain}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    restart: always

  redis:
    image: redis:7.2-alpine
    container_name: mmt-redis-cache
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secure_token}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - mapmytrain-mesh
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secure_token}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
    restart: always

  tileserver:
    image: maptiler/tileserver-gl:v4.11.0
    container_name: mmt-tile-server
    profiles:
      - tiles
    volumes:
      - ./config/tileserver:/data
      - tile_cache:/var/cache/tileserver-gl
    ports:
      - "${TILESERVER_PORT:-8080}:8080"
    command: -c /data/config.json --public_url http://localhost:8080
    networks:
      - mapmytrain-mesh
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mmt-fastapi-backend
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-mmt_admin}:${DB_PASSWORD:-secure_spatial_pwd}@db:5432/${POSTGRES_DB:-mapmytrain}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secure_token}@redis:6379/0
      - INGESTION_INTERVAL_SECONDS=${INGESTION_INTERVAL_SECONDS:-120}
      - DEVELOPMENT_MOCK_MODE=${DEVELOPMENT_MOCK_MODE:-false}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mapmytrain-mesh
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_WS_URL: ${NEXT_PUBLIC_BACKEND_WS_URL:-ws://localhost:8000/api/v1/stream}
        NEXT_PUBLIC_TILE_SERVER_URL: ${NEXT_PUBLIC_TILE_SERVER_URL:-http://localhost:8080}
        NEXT_PUBLIC_USE_MOCK_TELEMETRY: ${NEXT_PUBLIC_USE_MOCK_TELEMETRY:-false}
    container_name: mmt-nextjs-frontend
    environment:
      - NEXT_PUBLIC_BACKEND_WS_URL=${NEXT_PUBLIC_BACKEND_WS_URL:-ws://localhost:8000/api/v1/stream}
      - NEXT_PUBLIC_TILE_SERVER_URL=${NEXT_PUBLIC_TILE_SERVER_URL:-http://localhost:8080}
      - NEXT_PUBLIC_USE_MOCK_TELEMETRY=${NEXT_PUBLIC_USE_MOCK_TELEMETRY:-false}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mapmytrain-mesh
    deploy:
      resources:
        limits:
          memory: 256M
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
